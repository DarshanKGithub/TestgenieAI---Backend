spring.application.name=testgenie-backend
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/testgenie
spring.datasource.username=postgres
spring.datasource.password=Darshan@5148

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4

server.port=8080
server.error.include-stacktrace=never
server.error.include-message=always

management.endpoints.web.exposure.include=health,info

security.jwt.secret=9d58201aed9af3d1b341e86f5bb76d675926d9a511f207717b0ec5398d0fd12e
security.jwt.expiry-seconds=86400

playwright.worker.dir=./playwright-worker

testgenie.execution.pool-size=4
cicd.webhook.secret=${CICD_WEBHOOK_SECRET:testgenie-ci-secret}
security.registration.admin-invite-code=${ADMIN_REGISTRATION_INVITE_CODE:}
security.rate-limit.requests-per-window=120
visual.regression.storage-dir=./visual-regression-artifacts

ai.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai}
